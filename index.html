<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Korean Travel Essentials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- HOME SCREEN -->
    <div id="screen-home" class="screen active">
      <div class="home-header">
        <div class="home-title">한국어</div>
        <div class="home-subtitle">Korean Travel Essentials</div>
        <div class="home-tagline">Learn Korean for Jeju &amp; Seoul</div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-value" id="stat-points">0</div>
            <div class="stat-label">POINTS</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="stat-streak">0🔥</div>
            <div class="stat-label">STREAK</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="stat-complete">0%</div>
            <div class="stat-label">COMPLETE</div>
          </div>
        </div>
      </div>
      <div class="module-grid" id="module-grid"></div>
    </div>

    <!-- MODULE DETAIL SCREEN -->
    <div id="screen-module" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="showHome()">← Back</button>
        <div class="screen-title" id="module-detail-title"></div>
      </div>
      <div class="screen-body">
        <div class="module-hero" id="module-hero"></div>
        <div class="module-desc" id="module-desc"></div>
        <div class="lesson-list" id="lesson-list"></div>
        <div class="module-actions">
          <button class="btn-primary" id="btn-flashcards" onclick="startFlashcards()">
            🃏 Start Flashcards
          </button>
          <button class="btn-secondary" id="btn-quiz" onclick="startQuiz()">
            📝 Take Quiz
          </button>
        </div>
      </div>
    </div>

    <!-- FLASHCARD SCREEN -->
    <div id="screen-flashcard" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="showModule(currentModuleId)">← Back</button>
        <div class="screen-title" id="fc-module-title"></div>
      </div>
      <div class="fc-progress-bar-wrap">
        <div class="fc-progress-bar" id="fc-progress-bar"></div>
      </div>
      <div class="fc-counter" id="fc-counter">1 / 10</div>
      <div class="fc-scene" id="fc-scene">
        <div class="fc-card" id="fc-card">
          <div class="fc-front">
            <div class="fc-speak-btn" id="fc-speak-btn" onclick="speakCurrent()">🔊</div>
            <div class="fc-korean" id="fc-korean"></div>
            <div class="fc-romanization" id="fc-romanization"></div>
            <div class="fc-hint">Tap card to reveal</div>
          </div>
          <div class="fc-back">
            <div class="fc-speak-btn" onclick="speakCurrent()">🔊</div>
            <div class="fc-korean-sm" id="fc-korean-sm"></div>
            <div class="fc-english" id="fc-english"></div>
            <div class="fc-tip" id="fc-tip"></div>
          </div>
        </div>
      </div>
      <!-- Alphabet mode: sound-out panel -->
      <div class="soundout-panel" id="soundout-panel" style="display:none">
        <div class="soundout-label">SOUND IT OUT</div>
        <div class="soundout-breakdown" id="soundout-breakdown"></div>
      </div>
      <div class="fc-actions">
        <button class="btn-know" id="btn-know" onclick="markCard('know')">✓ I know this</button>
        <button class="btn-learning" id="btn-learning" onclick="markCard('learning')">↻ Still learning</button>
      </div>
      <div class="fc-nav">
        <button class="btn-nav" onclick="prevCard()">‹ Prev</button>
        <button class="btn-nav" onclick="nextCard()">Next ›</button>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="screen-quiz" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="showModule(currentModuleId)">← Back</button>
        <div class="screen-title" id="quiz-module-title"></div>
        <div class="quiz-score-display" id="quiz-score-display">0/10</div>
      </div>
      <div class="quiz-progress-bar-wrap">
        <div class="quiz-progress-bar" id="quiz-progress-bar"></div>
      </div>
      <div class="screen-body" id="quiz-body">
        <!-- Questions rendered here -->
      </div>
    </div>

    <!-- PROGRESS SCREEN -->
    <div id="screen-progress" class="screen">
      <div class="screen-header no-back">
        <div class="screen-title">My Progress</div>
      </div>
      <div class="screen-body">
        <div class="progress-stats">
          <div class="prog-stat"><span id="prog-points">0</span><label>Points</label></div>
          <div class="prog-stat"><span id="prog-streak">0</span><label>Day Streak</label></div>
          <div class="prog-stat"><span id="prog-modules">0/7</span><label>Modules</label></div>
        </div>
        <div class="section-title">Badges</div>
        <div class="badge-grid" id="badge-grid"></div>
        <div class="section-title">14-Day Study Plan</div>
        <div class="study-plan" id="study-plan"></div>
      </div>
    </div>

  </div><!-- /app -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showHome(); setNav('home')">
      <span>🏠</span><span>Home</span>
    </button>
    <button class="nav-btn" id="nav-flashcards" onclick="showLastFlashcard(); setNav('flashcards')">
      <span>🃏</span><span>Cards</span>
    </button>
    <button class="nav-btn" id="nav-quiz" onclick="showLastQuiz(); setNav('quiz')">
      <span>📝</span><span>Quiz</span>
    </button>
    <button class="nav-btn" id="nav-progress" onclick="showProgress(); setNav('progress')">
      <span>📊</span><span>Progress</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
